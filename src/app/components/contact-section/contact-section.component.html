<section id="contact" class="contact-section relative py-24 md:py-32 bg-charcoal overflow-hidden">
  <!-- Ambient background -->
  <div class="absolute inset-0 bg-gradient-to-b from-charcoal via-charcoal-light/30 to-charcoal pointer-events-none" aria-hidden="true"></div>
  <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_50%_100%,hsl(var(--gold)/0.08),transparent_60%)] pointer-events-none" aria-hidden="true"></div>

  <div class="container mx-auto px-6 relative z-10">
    <div class="text-center mb-16 md:mb-20" @fadeInUp>
      <span class="text-gold text-sm uppercase tracking-[0.3em] font-sans">Get In Touch</span>
      <h2 class="font-serif text-3xl md:text-5xl text-white mt-3 max-w-2xl mx-auto leading-tight">
        Ready to Invest in <span class="text-gradient-gold">Pune's Future?</span>
      </h2>
      <p class="text-white/60 font-sans mt-4 text-base md:text-lg max-w-xl mx-auto">
        Reach out—we're here to guide your next move.
      </p>
      <div class="w-16 h-0.5 gold-gradient mx-auto mt-6"></div>
    </div>

    <!-- Contact cards - creative grid -->
    <div class="max-w-4xl mx-auto">
      <div class="grid md:grid-cols-3 gap-6 md:gap-8">
        <!-- Call -->
        <a
          href="tel:+919130084709"
          class="contact-card group flex flex-col items-center text-center p-8 rounded-2xl bg-charcoal-light/50 border border-white/10 hover:border-gold/40 transition-all duration-500 hover:shadow-xl hover:shadow-gold/10"
          @slideInUp
          [style.animation-delay]="'0ms'"
        >
          <div class="contact-icon-wrapper mb-5">
            <lucide-icon name="phone" class="w-10 h-10 text-gold group-hover:scale-110 transition-transform duration-300" stroke-width="2"></lucide-icon>
          </div>
          <h3 class="text-white font-sans font-semibold uppercase tracking-wider text-sm mb-3">Call Us</h3>
          <p class="text-white/70 font-sans text-sm hover:text-gold transition-colors">+91 - 9130084709</p>
          <p class="text-white/70 font-sans text-sm hover:text-gold transition-colors">+91 - 9766562128</p>
        </a>

        <!-- Email -->
        <a
          href="mailto:info@garimarealty.com"
          class="contact-card group flex flex-col items-center text-center p-8 rounded-2xl bg-charcoal-light/50 border border-white/10 hover:border-gold/40 transition-all duration-500 hover:shadow-xl hover:shadow-gold/10"
          @slideInUp
          [style.animation-delay]="'100ms'"
        >
          <div class="contact-icon-wrapper mb-5">
            <lucide-icon name="mail" class="w-10 h-10 text-gold group-hover:scale-110 transition-transform duration-300" stroke-width="2"></lucide-icon>
          </div>
          <h3 class="text-white font-sans font-semibold uppercase tracking-wider text-sm mb-3">Email</h3>
          <p class="text-white/70 font-sans text-sm break-all hover:text-gold transition-colors">info@garimarealty.com</p>
        </a>

        <!-- Office -->
        <a
          href="https://maps.google.com/?q=Amanora+Park+Town+Hadapsar+Pune+411028"
          target="_blank"
          rel="noopener noreferrer"
          class="contact-card group flex flex-col items-center text-center p-8 rounded-2xl bg-charcoal-light/50 border border-white/10 hover:border-gold/40 transition-all duration-500 hover:shadow-xl hover:shadow-gold/10"
          @slideInUp
          [style.animation-delay]="'200ms'"
        >
          <div class="contact-icon-wrapper mb-5">
            <lucide-icon name="map-pin" class="w-10 h-10 text-gold group-hover:scale-110 transition-transform duration-300" stroke-width="2"></lucide-icon>
          </div>
          <h3 class="text-white font-sans font-semibold uppercase tracking-wider text-sm mb-3">Office</h3>
          <p class="text-white/70 font-sans text-sm hover:text-gold transition-colors">
            Amanora Park Town,<br />Hadapsar, Pune — 411028
          </p>
        </a>
      </div>

      <!-- WhatsApp CTA -->
      <div class="mt-12 md:mt-16 text-center" @fadeInUp>
        <a
          href="https://wa.me/919130084709?text=Hi%2C%20I'm%20interested%20in%20Garima%20Realty%20properties"
          target="_blank"
          rel="noopener noreferrer"
          class="inline-flex items-center gap-3 px-8 py-4 rounded-full bg-[#25D366] hover:bg-[#20bd5a] text-white font-sans font-semibold uppercase tracking-wider text-sm transition-all duration-300 hover:scale-105 shadow-lg hover:shadow-xl"
        >
          <lucide-icon name="message-circle" class="w-6 h-6" stroke-width="2"></lucide-icon>
          Chat on WhatsApp
        </a>
      </div>
    </div>
  </div>
</section>
