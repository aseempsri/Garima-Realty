<section id="partner-spotlight" class="jhamtani-ad-section relative">
  <!-- Full-bleed immersive background -->
  <div class="jhamtani-hero-bg absolute inset-0">
    <img
      [src]="projects[currentIndex].image"
      [alt]="projects[currentIndex].name"
      class="absolute inset-0 w-full h-full object-cover transition-opacity duration-700"
      loading="lazy"
    />
    <div class="absolute inset-0 bg-gradient-to-r from-charcoal/70 via-charcoal/55 to-charcoal/28"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-charcoal/70 via-transparent to-charcoal/42"></div>
  </div>

  <!-- Logo: Top of section - center on mobile, 14% from left on desktop -->
  <div class="absolute top-0 left-1/2 -translate-x-1/2 md:left-[14%] md:translate-x-0 z-20 pt-6 md:pt-8">
    <img [src]="logoPath" alt="Jhamtani Builders" class="h-[6.58rem] w-auto object-contain" />
  </div>

  <!-- Content: Split layout - Info left, Nav right -->
  <div class="relative z-10 min-h-[85vh] flex flex-col justify-end pb-16 md:pb-24 pt-32 md:pt-40">
    <div class="container mx-auto px-6 md:px-8 relative">
      <div class="max-w-4xl">
        <!-- Project info - Editorial style -->
        <div class="space-y-4" [@fadeUp]="currentIndex">
          <span class="text-gold/80 text-xs font-sans uppercase tracking-[0.25em]">
            {{ projects[currentIndex].type }}
          </span>
          <h2 class="font-serif text-4xl md:text-6xl lg:text-7xl text-white font-medium leading-[1.1] tracking-tight">
            {{ projects[currentIndex].name }}
          </h2>
          <p class="text-white/70 text-lg md:text-xl font-sans">
            {{ projects[currentIndex].configuration }} · {{ projects[currentIndex].location }}
          </p>
          <p class="text-gold font-serif text-2xl md:text-3xl font-medium">
            {{ projects[currentIndex].price }}
          </p>
        </div>

        <!-- Bottom row: thumbnails + nav -->
        <div class="mt-12 md:mt-16 flex flex-col md:flex-row md:items-end md:justify-between gap-6" (mouseenter)="stopAutoSlide()" (mouseleave)="startAutoSlide()">
          <div class="flex gap-4 overflow-x-auto scrollbar-hide pb-2 -mx-2 flex-1 min-w-0">
            @for (project of projects; track project.id; let i = $index) {
              <button
                (click)="goToSlide(i)"
                class="jhamtani-thumb flex-shrink-0 w-24 md:w-32 rounded-lg overflow-hidden border-2 transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-gold/50"
                [class.jhamtani-thumb-active]="i === currentIndex"
                [class.border-gold]="i === currentIndex"
                [class.border-white/20]="i !== currentIndex"
                [attr.aria-label]="'View ' + project.name"
              >
                <div class="aspect-[4/3] relative">
                  <img [src]="project.image" [alt]="project.name" class="w-full h-full object-cover" loading="lazy" />
                  @if (i === currentIndex) {
                    <div class="absolute inset-0 bg-gold/20"></div>
                  }
                </div>
              </button>
            }
          </div>
          <div class="flex items-center gap-4 flex-shrink-0">
            <span class="text-white/40 text-sm font-sans">{{ currentIndex + 1 }}/{{ projects.length }}</span>
            <div class="flex gap-2">
              <button
                (click)="previous()"
                class="w-12 h-12 rounded-full bg-white/10 hover:bg-white/20 border border-white/20 flex items-center justify-center transition-all duration-300 hover:scale-105 shrink-0"
                aria-label="Previous"
              >
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
              </button>
              <button
                (click)="next()"
                class="w-12 h-12 rounded-full bg-white/10 hover:bg-white/20 border border-white/20 flex items-center justify-center transition-all duration-300 hover:scale-105 shrink-0"
                aria-label="Next"
              >
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
